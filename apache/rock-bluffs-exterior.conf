<VirtualHost *:80>
    ServerName exterior.rockbluffs.com
    Redirect permanent / https://exterior.rockbluffs.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName exterior.rockbluffs.com
    DocumentRoot /var/www/rock-bluffs-exterior/public

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/exterior.rockbluffs.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/exterior.rockbluffs.com/privkey.pem

    <Directory /var/www/rock-bluffs-exterior/public>
        Options -Indexes -ExecCGI
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/rock-bluffs-exterior/storage>
        Require all denied
    </Directory>

    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "camera=(self), geolocation=(self), microphone=()"

    ErrorLog ${APACHE_LOG_DIR}/rock-bluffs-exterior-error.log
    CustomLog ${APACHE_LOG_DIR}/rock-bluffs-exterior-access.log combined
</VirtualHost>
